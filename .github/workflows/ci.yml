name: CI
on: [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: 10.0.x }
      - run: npm ci
        working-directory: apps/web
      - run: npm run format && npm run lint && npm run test && npm run build
        working-directory: apps/web
      - run: dotnet restore apps/api/Cpp.Api.csproj
      - run: dotnet format apps/api/Cpp.Api.csproj --verify-no-changes --no-restore
      - run: dotnet build apps/api/Cpp.Api.csproj --no-restore
      - run: dotnet test apps/api/Cpp.Api.csproj --no-build
      - run: docker compose build
