name: Chatbot Bicep Infrastructure

on:
  push:
    branches:
      - agent/chatbot-bicep-infrastructure
    paths:
      - "infra/bicep/chatbot/**"
      - ".github/workflows/chatbot-bicep-azure.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Existing CPP Azure environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - qa
          - prod
      location:
        description: Azure OpenAI deployment region
        required: true
        default: eastus2
        type: string
      model_name:
        description: Azure OpenAI model name
        required: true
        default: gpt-5.4-mini
        type: string
      model_version:
        description: Azure OpenAI model version
        required: true
        default: "2026-03-17"
        type: string
      model_sku:
        description: Azure OpenAI deployment SKU
        required: true
        default: GlobalStandard
        type: choice
        options:
          - GlobalStandard
          - Standard
          - DataZoneStandard
      model_capacity:
        description: Deployment capacity in thousands of tokens per minute
        required: true
        default: "10"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: chatbot-bicep-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  BICEP_ROOT: infra/bicep/chatbot
  DEPLOY_ENVIRONMENT: ${{ inputs.environment || 'dev' }}
  AI_LOCATION: ${{ inputs.location || 'eastus2' }}
  MODEL_NAME: ${{ inputs.model_name || 'gpt-5.4-mini' }}
  MODEL_VERSION: ${{ inputs.model_version || '2026-03-17' }}
  MODEL_SKU: ${{ inputs.model_sku || 'GlobalStandard' }}
  MODEL_CAPACITY: ${{ inputs.model_capacity || '10' }}

jobs:
  deploy:
    name: Validate and deploy chatbot infrastructure
    runs-on: ubuntu-latest
    environment: azure-infra

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve existing Terraform resources
        id: existing
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -euo pipefail

            resource_group="$(az group list \
              --query "[?tags.application=='CPP Order Management Portal' && tags.environment=='${DEPLOY_ENVIRONMENT}'].name | [0]" \
              --output tsv)"
            if [[ -z "$resource_group" ]]; then
              echo "No Terraform-managed CPP resource group was found for ${DEPLOY_ENVIRONMENT}." >&2
              exit 1
            fi

            api_app="$(az webapp list --resource-group "$resource_group" \
              --query "[?starts_with(name, 'api-')].name | [0]" --output tsv)"
            api_principal_id="$(az webapp identity show --resource-group "$resource_group" \
              --name "$api_app" --query principalId --output tsv)"
            workspace_id="$(az monitor log-analytics workspace list --resource-group "$resource_group" \
              --query '[0].id' --output tsv)"

            for value in "$api_app" "$api_principal_id" "$workspace_id"; do
              if [[ -z "$value" ]]; then
                echo "An expected API identity or Log Analytics resource could not be resolved." >&2
                exit 1
              fi
            done

            echo "resource_group=$resource_group" >> "$GITHUB_OUTPUT"
            echo "api_app=$api_app" >> "$GITHUB_OUTPUT"
            echo "api_principal_id=$api_principal_id" >> "$GITHUB_OUTPUT"
            echo "workspace_id=$workspace_id" >> "$GITHUB_OUTPUT"

      - name: Verify model availability and quota
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -euo pipefail

            version_count="$(az cognitiveservices model list --location "$AI_LOCATION" \
              --query "length([?model.name=='${MODEL_NAME}' && model.version=='${MODEL_VERSION}' && contains(model.skus[].name, '${MODEL_SKU}')])" \
              --output tsv)"
            if [[ "$version_count" == "0" ]]; then
              echo "${MODEL_NAME} ${MODEL_VERSION} with SKU ${MODEL_SKU} is unavailable in ${AI_LOCATION}." >&2
              exit 1
            fi

            quota_name="OpenAI.${MODEL_SKU}.${MODEL_NAME}"
            quota_limit="$(az cognitiveservices usage list --location "$AI_LOCATION" \
              --query "[?name.value=='${quota_name}'].limit | [0]" --output tsv)"
            quota_used="$(az cognitiveservices usage list --location "$AI_LOCATION" \
              --query "[?name.value=='${quota_name}'].currentValue | [0]" --output tsv)"
            if [[ -z "$quota_limit" || -z "$quota_used" ]]; then
              echo "No quota meter named ${quota_name} was found in ${AI_LOCATION}." >&2
              exit 1
            fi

            quota_limit_integer="${quota_limit%%.*}"
            quota_used_integer="${quota_used%%.*}"
            available=$((quota_limit_integer - quota_used_integer))
            if (( available < MODEL_CAPACITY )); then
              echo "Insufficient ${quota_name} quota: requested ${MODEL_CAPACITY}, available ${available}." >&2
              exit 1
            fi

      - name: Validate Bicep deployment
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: validate
          name: cpp-chatbot-${{ env.DEPLOY_ENVIRONMENT }}-${{ github.run_number }}-validate
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ steps.existing.outputs.resource_group }}
          template-file: ${{ env.BICEP_ROOT }}/main.bicep
          validation-level: provider
          parameters: |
            environment: ${{ env.DEPLOY_ENVIRONMENT }}
            location: ${{ env.AI_LOCATION }}
            modelName: ${{ env.MODEL_NAME }}
            modelVersion: ${{ env.MODEL_VERSION }}
            modelSkuName: ${{ env.MODEL_SKU }}
            modelCapacity: ${{ env.MODEL_CAPACITY }}
            apiPrincipalId: ${{ steps.existing.outputs.api_principal_id }}
            logAnalyticsWorkspaceResourceId: ${{ steps.existing.outputs.workspace_id }}

      - name: Preview resource changes
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: whatIf
          name: cpp-chatbot-${{ env.DEPLOY_ENVIRONMENT }}-${{ github.run_number }}-whatif
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ steps.existing.outputs.resource_group }}
          template-file: ${{ env.BICEP_ROOT }}/main.bicep
          validation-level: provider
          parameters: |
            environment: ${{ env.DEPLOY_ENVIRONMENT }}
            location: ${{ env.AI_LOCATION }}
            modelName: ${{ env.MODEL_NAME }}
            modelVersion: ${{ env.MODEL_VERSION }}
            modelSkuName: ${{ env.MODEL_SKU }}
            modelCapacity: ${{ env.MODEL_CAPACITY }}
            apiPrincipalId: ${{ steps.existing.outputs.api_principal_id }}
            logAnalyticsWorkspaceResourceId: ${{ steps.existing.outputs.workspace_id }}

      - name: Deploy chatbot resources
        id: deployment
        uses: azure/bicep-deploy@v2
        with:
          type: deployment
          operation: create
          name: cpp-chatbot-${{ env.DEPLOY_ENVIRONMENT }}-${{ github.run_number }}
          scope: resourceGroup
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group-name: ${{ steps.existing.outputs.resource_group }}
          template-file: ${{ env.BICEP_ROOT }}/main.bicep
          masked-outputs: agentApiKeyAppSettingValue
          parameters: |
            environment: ${{ env.DEPLOY_ENVIRONMENT }}
            location: ${{ env.AI_LOCATION }}
            modelName: ${{ env.MODEL_NAME }}
            modelVersion: ${{ env.MODEL_VERSION }}
            modelSkuName: ${{ env.MODEL_SKU }}
            modelCapacity: ${{ env.MODEL_CAPACITY }}
            apiPrincipalId: ${{ steps.existing.outputs.api_principal_id }}
            logAnalyticsWorkspaceResourceId: ${{ steps.existing.outputs.workspace_id }}

      - name: Configure existing API chatbot settings
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az webapp config appsettings set \
              --resource-group "${{ steps.existing.outputs.resource_group }}" \
              --name "${{ steps.existing.outputs.api_app }}" \
              --settings \
                "Agent__Endpoint=${{ steps.deployment.outputs.azureOpenAiEndpoint }}" \
                "Agent__Deployment=${{ steps.deployment.outputs.agentDeploymentName }}" \
                "Agent__ApiVersion=${{ steps.deployment.outputs.agentApiVersion }}" \
                'Agent__ApiKey=${{ steps.deployment.outputs.agentApiKeyAppSettingValue }}' \
              --output none

      - name: Verify deployed resources
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az cognitiveservices account show \
              --resource-group "${{ steps.existing.outputs.resource_group }}" \
              --name "${{ steps.deployment.outputs.azureOpenAiAccountName }}" \
              --query "{name:name,state:properties.provisioningState,endpoint:properties.endpoint}" \
              --output table
            az cognitiveservices account deployment show \
              --resource-group "${{ steps.existing.outputs.resource_group }}" \
              --name "${{ steps.deployment.outputs.azureOpenAiAccountName }}" \
              --deployment-name "${{ steps.deployment.outputs.agentDeploymentName }}" \
              --query "{name:name,state:properties.provisioningState,model:properties.model.name,version:properties.model.version}" \
              --output table

      - name: Publish deployment summary
        run: |
          echo "### Chatbot Bicep deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${DEPLOY_ENVIRONMENT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Resource group: ${{ steps.existing.outputs.resource_group }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Azure OpenAI account: ${{ steps.deployment.outputs.azureOpenAiAccountName }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Model: ${MODEL_NAME} ${MODEL_VERSION} (${MODEL_SKU}, capacity ${MODEL_CAPACITY})" >> "$GITHUB_STEP_SUMMARY"
          echo "- API App Service: ${{ steps.existing.outputs.api_app }}" >> "$GITHUB_STEP_SUMMARY"
